services:
  - type: web
    name: notes-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /about
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: ABOUT_NAME
        sync: false
      - key: ABOUT_EMAIL
        sync: false

databases:
  - name: notes-db
    plan: free
    databaseName: notes
    user: notes
